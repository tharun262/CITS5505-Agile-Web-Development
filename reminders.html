<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminders - KeepLite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" /> 
    <script src="auth-guard.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle">
      <div class="container-fluid px-3 px-lg-4 gap-3">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light d-lg-none rounded-circle" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list fs-5"></i>
          </button>
          <a class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark" href="index.html">
            <span class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm">
              <i class="bi bi-lightbulb-fill"></i>
            </span>
            <span>KeepLite</span>
          </a>
        </div>
        <form class="search-pill flex-grow-1 mx-lg-3">
          <div class="input-group input-group-lg">
            <span class="input-group-text rounded-start-pill px-3"><i class="bi bi-search text-muted"></i></span>
            <input type="search" class="form-control rounded-end-pill px-2" placeholder="Search notes" />
          </div>
        </form>
        <button class="btn btn-light rounded-circle shadow-sm" type="button" onclick="window.location.href='profile.html'"><i class="bi bi-person-circle fs-5"></i></button>
      </div>
    </nav>

    <div class="container-fluid px-3 px-lg-4">
      <div class="d-flex align-items-start gap-4">
        <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
          <div class="sidebar-sticky">
            <nav class="nav flex-column gap-2">
              <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
              <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
              <a class="nav-link sidebar-link" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
              <a class="nav-link sidebar-link active" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
              <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
              <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
            </nav>
          </div>
        </aside>

        <main class="flex-grow-1 pb-5">
          <div class="card note-create border-0 bg-white mx-auto mb-5">
            <div class="card-body px-4 py-3 d-flex justify-content-between align-items-center">
              <span class="text-secondary fw-medium">Add a reminder...</span>
              <div class="d-flex gap-3 text-muted">
                <i class="bi bi-bell"></i>
                <i class="bi bi-check2-square"></i>
              </div>
            </div>
          </div>

          <h5 class="text-muted mb-4 ms-2 fw-bold" style="font-size: 0.9rem; letter-spacing: 0.5px;">UPCOMING</h5>
          <div class="row g-4">
            <div class="col-12 col-md-6 col-xl-3">
              <div class="card note-card h-100 bg-white">
                <div class="card-body">
                  <h2 class="h6 fw-bold mb-3">Agile Standup</h2>
                  <p class="text-secondary mb-3">Discuss frontend progress and assign Flask backend tasks.</p>
                  <span class="badge rounded-pill badge-soft border border-secondary-subtle">
                    <i class="bi bi-clock me-1"></i> Today, 14:00
                  </span>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
              <div class="card note-card h-100" style="background: #e8f0fe">
                <div class="card-body">
                  <h2 class="h6 fw-bold mb-3">Submit Checkpoint 2</h2>
                  <p class="mb-3 text-dark">Ensure all UI prototypes are pushed to the GitHub repository.</p>
                  <span class="badge rounded-pill bg-white text-dark shadow-sm">
                    <i class="bi bi-calendar-event me-1"></i> Tomorrow, 23:59
                  </span>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="reminders.js"></script>
  </body>
</html>
