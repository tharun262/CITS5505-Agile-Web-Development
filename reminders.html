<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminders - KeepLite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="auth-guard.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle">
      <div class="container-fluid px-3 px-lg-4 gap-3">
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-light d-lg-none rounded-circle"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar"
            aria-label="Open menu"
          >
            <i class="bi bi-list fs-5"></i>
          </button>
          <a class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark" href="index.html">
            <span class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm">
              <i class="bi bi-lightbulb-fill"></i>
            </span>
            <span>KeepLite</span>
          </a>
        </div>

        <form class="search-pill flex-grow-1 mx-lg-3" onsubmit="return false;">
          <div class="input-group input-group-lg">
            <span class="input-group-text rounded-start-pill px-3">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input
              type="search"
              class="form-control rounded-end-pill px-2"
              placeholder="Search reminders"
              id="searchRemindersInput"
            />
          </div>
        </form>

        <div class="d-flex align-items-center gap-2">
          <button id="enableNotificationsBtn" class="btn btn-warning rounded-pill shadow-sm" type="button">
            <i class="bi bi-bell me-2"></i>Enable Notifications
          </button>
          <button
            class="btn btn-light rounded-circle shadow-sm"
            type="button"
            onclick="window.location.href='profile.html'"
            aria-label="Profile"
          >
            <i class="bi bi-person-circle fs-5"></i>
          </button>
        </div>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold" id="mobileSidebarLabel">KeepLite</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <nav class="nav flex-column gap-2">
          <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
          <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
          <a class="nav-link sidebar-link" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
          <a class="nav-link sidebar-link active" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
          <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
          <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
        </nav>
      </div>
    </div>

    <div class="container-fluid px-3 px-lg-4">
      <div class="d-flex align-items-start gap-4">
        <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
          <div class="sidebar-sticky">
            <nav class="nav flex-column gap-2">
              <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
              <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
              <a class="nav-link sidebar-link" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
              <a class="nav-link sidebar-link active" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
              <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
              <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
            </nav>
          </div>
        </aside>

        <main class="flex-grow-1 pb-5">
          <div class="card note-create border-0 bg-white mx-auto mb-4" id="addReminderCard">
            <div class="card-body px-4 py-3 d-flex justify-content-between align-items-center">
              <span class="text-secondary fw-medium">Add a reminder...</span>
              <div class="d-flex gap-3 text-muted">
                <i class="bi bi-bell"></i>
                <i class="bi bi-check2-square"></i>
              </div>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2 mb-4 ms-2">
            <span class="badge text-bg-light">Total: <span id="statTotal">0</span></span>
            <span class="badge text-bg-light">Today: <span id="statToday">0</span></span>
            <span class="badge text-bg-light">Upcoming: <span id="statUpcoming">0</span></span>
            <span class="badge text-bg-light">Overdue: <span id="statOverdue">0</span></span>
          </div>

          <h5 class="text-muted mb-4 ms-2 fw-bold" style="font-size: 0.9rem; letter-spacing: 0.5px;">
            UPCOMING
          </h5>

          <div class="row g-4" id="remindersGrid"></div>
        </main>
      </div>
    </div>

    <div class="modal fade" id="addReminderModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Create Reminder</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <form id="reminderForm">
            <div class="modal-body">
              <div class="mb-3">
                <label for="reminderTitle" class="form-label">Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="reminderTitle"
                  placeholder="Enter reminder title"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="reminderDescription" class="form-label">Description</label>
                <textarea
                  class="form-control"
                  id="reminderDescription"
                  rows="3"
                  placeholder="Write reminder details"
                ></textarea>
              </div>

              <div class="mb-3">
                <label for="reminderDueAt" class="form-label">Reminder Time</label>
                <input
                  type="datetime-local"
                  class="form-control"
                  id="reminderDueAt"
                  required
                />
              </div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Reminder</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="reminders.js"></script>
  </body>
</html>
