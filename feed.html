<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed - KeepLite</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script src="auth-guard.js"></script>

  <style>
    .feed-author-link {
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .feed-author-link:hover {
      color: #ffd54f !important;
      text-decoration: underline !important;
    }

    .feed-toolbar {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .feed-post {
      border: 0;
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feed-post:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.12);
    }

    .feed-post .card-body {
      padding: 1.25rem;
    }

    .post-meta-line {
      font-size: 0.88rem;
      color: #6c757d;
    }

    .post-title {
      font-size: 1.06rem;
      line-height: 1.35;
    }

    .post-caption {
      white-space: pre-wrap;
    }

    .engagement-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      margin-top: 12px;
    }

    .engagement-stats {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #6c757d;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .engagement-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .like-btn {
      border: 0;
      background: #fff7db;
      color: #7a5a00;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .like-btn:hover {
      background: #ffe9a8;
      transform: translateY(-1px);
    }

    .like-btn.liked {
      background: #ffd54f;
      color: #3d2b00;
      box-shadow: 0 8px 18px rgba(255, 213, 79, 0.35);
    }

    .comment-wrap {
      background: #fafafa;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 18px;
      padding: 12px 14px;
    }

    .comment-row:last-child {
      border-bottom: 0 !important;
      padding-bottom: 0 !important;
      margin-bottom: 0 !important;
    }

    .comment-composer .form-control {
      border-radius: 999px;
    }

    .comment-composer .btn {
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle">
    <div class="container-fluid px-3 px-lg-4 gap-3">
      <div class="d-flex align-items-center gap-2">
        <button
          class="btn btn-light d-lg-none rounded-circle"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#mobileSidebar"
        >
          <i class="bi bi-list fs-5"></i>
        </button>
        <a
          class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark"
          href="index.html"
        >
          <span
            class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm"
          >
            <i class="bi bi-lightbulb-fill"></i>
          </span>
          <span>KeepLite</span>
        </a>
      </div>

      <button
        class="btn btn-light rounded-circle shadow-sm ms-auto"
        type="button"
        aria-label="Profile"
        onclick="window.location.href='profile.html'"
      >
        <i class="bi bi-person-circle fs-5"></i>
      </button>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title fw-bold">KeepLite</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav flex-column gap-2">
        <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
        <a class="nav-link sidebar-link active" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
        <a class="nav-link sidebar-link" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
        <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
        <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
        <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
      </nav>
    </div>
  </div>

  <div class="container-fluid px-3 px-lg-4">
    <div class="d-flex align-items-start gap-4">
      <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
        <div class="sidebar-sticky">
          <nav class="nav flex-column gap-2">
            <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
            <a class="nav-link sidebar-link active" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
            <a class="nav-link sidebar-link" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
            <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
            <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
            <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
          </nav>
        </div>
      </aside>

      <main class="flex-grow-1 pb-5" style="max-width: 760px; margin: 0 auto;">
        <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap mb-3">
          <div>
            <h1 class="h4 fw-bold mb-1">Public Feed</h1>
            <p class="text-secondary mb-0">Popular posts float to the top automatically.</p>
          </div>
          <button class="btn btn-light rounded-pill px-4 fw-semibold" type="button" onclick="loadFeed()">
            <i class="bi bi-arrow-clockwise me-2"></i>Refresh
          </button>
        </div>

        <div class="feed-toolbar d-flex justify-content-between align-items-center gap-3 flex-wrap">
          <div class="small text-secondary">
            Feed order updates quietly in the background based on likes and comments.
          </div>
        </div>

        <div id="feed-container">
          <p class="text-muted text-center pt-5">Loading...</p>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="feed.js"></script>
</body>
</html>
