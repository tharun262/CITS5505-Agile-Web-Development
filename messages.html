<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - KeepLite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
      .messages-shell {
        max-width: 720px;
        margin: 0 auto;
      }

      .messages-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }

      .messages-filter-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }

      .messages-filter-wrap .btn {
        border-radius: 999px;
      }

      .message-card {
        border: 0;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .message-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      }

      .message-preview {
        color: #5f6368;
        line-height: 1.6;
      }

      .message-meta {
        font-size: 0.9rem;
        color: #7b7f86;
      }

      .message-user {
        color: #5d4037;
      }

      .message-actions .btn {
        border-radius: 999px;
      }

      .messages-empty {
        background: rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 2rem 1.5rem;
        text-align: center;
        color: #6b7280;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      }

      @media (max-width: 576px) {
        .messages-page-header {
          align-items: stretch;
        }

        .messages-page-header .btn {
          width: 100%;
        }

        .message-actions {
          width: 100%;
          margin-top: 1rem;
        }

        .message-actions .btn-group {
          width: 100%;
        }

        .message-actions .btn-group .btn {
          flex: 1;
        }
      }
    </style>

    <script src="auth-guard.js"></script>
    <script src="reminder-notifications.js"></script>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle">
      <div class="container-fluid px-3 px-lg-4 gap-3">
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-light d-lg-none rounded-circle"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar"
            aria-label="Open menu"
          >
            <i class="bi bi-list fs-5"></i>
          </button>

          <a class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark" href="index.html">
            <span class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm">
              <i class="bi bi-lightbulb-fill"></i>
            </span>
            <span>KeepLite</span>
          </a>
        </div>

        <div class="d-flex align-items-center gap-2 ms-auto">
          <span class="badge bg-danger" id="unreadCount" style="display: none;">0</span>
          <button
            class="btn btn-light rounded-circle shadow-sm"
            type="button"
            aria-label="Profile"
            onclick="window.location.href='profile.html'"
          >
            <i class="bi bi-person-circle fs-5"></i>
          </button>
        </div>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold">KeepLite</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>

      <div class="offcanvas-body">
        <nav class="nav flex-column gap-2">
          <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
          <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
          <a class="nav-link sidebar-link active" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
          <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
          <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
          <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
        </nav>
      </div>
    </div>

    <div class="container-fluid px-3 px-lg-4">
      <div class="d-flex align-items-start gap-4">
        <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
          <div class="sidebar-sticky">
            <nav class="nav flex-column gap-2">
              <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
              <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
              <a class="nav-link sidebar-link active" href="messages.html"><i class="bi bi-envelope me-2"></i>Messages</a>
              <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
              <a class="nav-link sidebar-link" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
              <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
            </nav>
          </div>
        </aside>

        <main class="flex-grow-1 pb-5 messages-shell">
          <div class="messages-page-header">
            <h1 class="h4 fw-bold mb-0">Messages</h1>
            <button class="btn btn-primary" type="button" onclick="showNewMessageModal()">
              <i class="bi bi-send me-2"></i>New Message
            </button>
          </div>

          <div class="messages-filter-wrap" role="group" aria-label="Message filters">
            <input type="radio" class="btn-check" name="messageFilter" id="filterAll" autocomplete="off" checked>
            <label class="btn btn-outline-primary" for="filterAll">All</label>

            <input type="radio" class="btn-check" name="messageFilter" id="filterReceived" autocomplete="off">
            <label class="btn btn-outline-primary" for="filterReceived">Received</label>

            <input type="radio" class="btn-check" name="messageFilter" id="filterSent" autocomplete="off">
            <label class="btn btn-outline-primary" for="filterSent">Sent</label>

            <input type="radio" class="btn-check" name="messageFilter" id="filterUnread" autocomplete="off">
            <label class="btn btn-outline-primary" for="filterUnread">Unread</label>
          </div>

          <div id="messagesList">
            <div class="messages-empty">
              <p class="mb-0">Loading messages...</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- New Message Modal -->
    <div
      class="modal fade"
      id="newMessageModal"
      tabindex="-1"
      aria-labelledby="newMessageModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="newMessageModalLabel">New Message</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label for="recipientUsername" class="form-label">Recipient Username</label>
              <input
                type="text"
                class="form-control"
                id="recipientUsername"
                placeholder="Enter username"
              />
            </div>

            <div class="mb-3">
              <label for="messageContent" class="form-label">Message</label>
              <textarea
                class="form-control"
                id="messageContent"
                rows="4"
                placeholder="Type your message..."
              ></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Conversation Modal -->
    <div
      class="modal fade"
      id="conversationModal"
      tabindex="-1"
      aria-labelledby="conversationTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="conversationTitle">Conversation</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body d-flex flex-column">
            <div
              id="conversationMessages"
              class="flex-grow-1 mb-3"
              style="min-height: 320px; max-height: 400px; overflow-y: auto;"
            ></div>

            <div class="input-group">
              <input
                type="text"
                class="form-control"
                id="replyContent"
                placeholder="Type a reply..."
              />
              <button class="btn btn-warning" type="button" onclick="sendReply()">
                Reply
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="messages.js"></script>
  </body>
</html>
