<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labels - KeepLite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="auth-guard.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle">
      <div class="container-fluid px-3 px-lg-4 gap-3">
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-light d-lg-none rounded-circle"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar"
          >
            <i class="bi bi-list fs-5"></i>
          </button>
          <a class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark" href="index.html">
            <span class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm">
              <i class="bi bi-lightbulb-fill"></i>
            </span>
            <span>KeepLite</span>
          </a>
        </div>
        <form class="search-pill flex-grow-1 mx-lg-3">
          <div class="input-group input-group-lg">
            <span class="input-group-text rounded-start-pill px-3"><i class="bi bi-search text-muted"></i></span>
            <input type="search" class="form-control rounded-end-pill px-2" placeholder="Search notes" />
          </div>
        </form>
        <button class="btn btn-light rounded-circle shadow-sm" type="button" onclick="window.location.href='profile.html'"><i class="bi bi-person-circle fs-5"></i></button>
      </div>
    </nav>

    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="mobileSidebar"
      aria-labelledby="mobileSidebarLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold" id="mobileSidebarLabel">KeepLite</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <nav class="nav flex-column gap-2">
          <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
          <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
          <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
          <a class="nav-link sidebar-link active" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
          <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
        </nav>
      </div>
    </div>

    <div class="container-fluid px-3 px-lg-4">
      <div class="d-flex align-items-start gap-4">
        <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
          <div class="sidebar-sticky">
            <nav class="nav flex-column gap-2">
              <a class="nav-link sidebar-link" href="index.html"><i class="bi bi-stickies me-2"></i>Notes</a>
              <a class="nav-link sidebar-link" href="feed.html"><i class="bi bi-globe2 me-2"></i>Feed</a>
              <a class="nav-link sidebar-link" href="reminders.html"><i class="bi bi-bell me-2"></i>Reminders</a>
              <a class="nav-link sidebar-link active" href="labels.html"><i class="bi bi-tag me-2"></i>Labels</a>
              <a class="nav-link sidebar-link" href="archive.html"><i class="bi bi-archive me-2"></i>Archive</a>
            </nav>
          </div>
        </aside>

        <main class="flex-grow-1 pb-5">
          <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
            <h4 class="fw-bold mb-0 text-dark">
              <i class="bi bi-tag me-2 text-muted"></i>
              <span id="labels-header">Labels</span>
            </h4>
            <button id="clear-filter-btn" class="btn btn-outline-secondary rounded-pill fw-medium d-none">
              <i class="bi bi-x me-1"></i>Clear filter
            </button>
          </div>

          <p class="text-muted small mb-3">Click a label to see tasks tagged with it.</p>
          <div id="labels-chips" class="d-flex flex-wrap gap-2 mb-4">
            <span class="text-muted small">Loading…</span>
          </div>

          <div id="labels-tasks-container" class="row g-4"></div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="labels.js"></script>
  </body>
</html>
