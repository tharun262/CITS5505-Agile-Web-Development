<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card note-card bg-white p-4" style="max-width: 420px; width: 100%;">
      <h2 class="fw-bold mb-3">Register</h2>

      <input id="username" class="form-control mb-3" placeholder="Username">
      <input id="email" class="form-control mb-3" placeholder="Email">
      <input id="password" class="form-control mb-3" type="password" placeholder="Password">

      <button class="btn btn-warning w-100 fw-bold" onclick="register()">Register</button>

      <p class="mt-3">Already have an account? <a href="login.html">Login here</a></p>
      <pre id="result" class="small text-secondary"></pre>
    </div>
  </main>

  <script>
    function register() {
      fetch("http://127.0.0.1:5000/auth/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: document.getElementById("username").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("result").innerText = JSON.stringify(data, null, 2);
      });
    }
  </script>
</body>
</html>
