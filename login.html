<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card note-card bg-white p-4" style="max-width: 420px; width: 100%;">
      <h2 class="fw-bold mb-3">Login</h2>

      <input id="username" class="form-control mb-3" placeholder="Username or email">
      <input id="password" class="form-control mb-3" type="password" placeholder="Password">

      <button class="btn btn-warning w-100 fw-bold" onclick="login()">Login</button>

      <p class="mt-3">No account? <a href="register.html">Register here</a></p>

      <!-- Clean error message -->
      <p id="result" class="text-danger small mt-2"></p>
    </div>
  </main>

  <script>
    function login() {
      fetch("http://127.0.0.1:5000/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        credentials: "include",
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.message === "Logged in successfully") {
          alert("Login successful!");
          window.location.href = "index.html";
        } else {
          document.getElementById("result").innerText = data.error || "Login failed";
        }
      })
      .catch(() => {
        document.getElementById("result").innerText = "Server error. Try again.";
      });
    }
  </script>
</body>
</html>
