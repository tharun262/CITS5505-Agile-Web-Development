<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="auth-guard.js"></script>
    <script src="reminder-notifications.js"></script>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg fixed-top glass-nav border-bottom border-light-subtle"
    >
      <div class="container-fluid px-3 px-lg-4 gap-3">
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-light d-lg-none rounded-circle"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar"
          >
            <i class="bi bi-list fs-5"></i>
          </button>
          <a
            class="navbar-brand d-flex align-items-center gap-2 mb-0 fw-bold text-dark"
            href="index.html"
          >
            <span
              class="brand-mark rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm"
            >
              <i class="bi bi-lightbulb-fill"></i>
            </span>
            <span>KeepLite</span>
          </a>
        </div>

        <form class="search-pill flex-grow-1 mx-lg-3" onsubmit="return false;">
          <div class="input-group input-group-lg">
            <span class="input-group-text rounded-start-pill px-3"
              ><i class="bi bi-search text-muted"></i
            ></span>
            <input
              type="search"
              class="form-control rounded-end-pill px-2"
              placeholder="Search notes"
            />
          </div>
        </form>

        <div class="d-flex gap-3 align-items-center ms-auto">
          <button class="btn btn-light rounded-circle shadow-sm" type="button" aria-label="Messages" onclick="window.location.href='messages.html'">
            <i class="bi bi-envelope fs-5"></i>
          </button>
          <button class="btn btn-light rounded-circle shadow-sm" type="button" aria-label="Profile" onclick="window.location.href='profile.html'">
            <i class="bi bi-person-circle fs-5"></i>
          </button>
        </div>
      </div>
    </nav>

    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="mobileSidebar"
      aria-labelledby="mobileSidebarLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold" id="mobileSidebarLabel">
          KeepLite
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <nav class="nav flex-column gap-2">
          <a class="nav-link sidebar-link active" href="index.html"
            ><i class="bi bi-stickies me-2"></i>Notes</a
          >
          <a class="nav-link sidebar-link" href="feed.html"
            ><i class="bi bi-globe2 me-2"></i>Feed</a
          >
          <a class="nav-link sidebar-link" href="messages.html"
            ><i class="bi bi-envelope me-2"></i>Messages</a
          >
          <a class="nav-link sidebar-link" href="reminders.html"
            ><i class="bi bi-bell me-2"></i>Reminders</a
          >
          <a class="nav-link sidebar-link" href="labels.html"
            ><i class="bi bi-tag me-2"></i>Labels</a
          >
          <a class="nav-link sidebar-link" href="archive.html"
            ><i class="bi bi-archive me-2"></i>Archive</a
          >
        </nav>
      </div>
    </div>

    <div class="container-fluid px-3 px-lg-4">
      <div class="d-flex align-items-start gap-4">
        <aside class="sidebar-desktop d-none d-lg-block flex-shrink-0">
          <div class="sidebar-sticky">
            <nav class="nav flex-column gap-2">
              <a class="nav-link sidebar-link active" href="index.html"
                ><i class="bi bi-stickies me-2"></i>Notes</a
              >
              <a class="nav-link sidebar-link" href="feed.html"
                ><i class="bi bi-globe2 me-2"></i>Feed</a
              >
              <a class="nav-link sidebar-link" href="messages.html"
                ><i class="bi bi-envelope me-2"></i>Messages</a
              >
              <a class="nav-link sidebar-link" href="reminders.html"
                ><i class="bi bi-bell me-2"></i>Reminders</a
              >
              <a class="nav-link sidebar-link" href="labels.html"
                ><i class="bi bi-tag me-2"></i>Labels</a
              >
              <a class="nav-link sidebar-link" href="archive.html"
                ><i class="bi bi-archive me-2"></i>Archive</a
              >
            </nav>
          </div>
        </aside>

        <main class="flex-grow-1 pb-5">
          <div class="d-flex gap-3 mb-4">
            <button class="btn btn-light flex-grow-1 py-3 text-start" id="btn-text-note" type="button">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-pencil-square fs-5 text-muted"></i>
                <div>
                  <div class="fw-medium text-dark">Take a note</div>
                  <div class="small text-secondary">Create a text note</div>
                </div>
              </div>
            </button>
            <button class="btn btn-light flex-grow-1 py-3 text-start" id="btn-image-note" type="button">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-image fs-5 text-muted"></i>
                <div>
                  <div class="fw-medium text-dark">Image Note</div>
                  <div class="small text-secondary">Upload an image and add text</div>
                </div>
              </div>
            </button>
          </div>

          <div class="row g-4" id="tasks-container">
            <div class="col-12"><p class="text-muted text-center pt-5">Loading notes...</p></div>
          </div>
        </main>
      </div>
    </div>

    <!-- Create / Edit Note Modal -->
    <div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-0 pb-0">
            <div>
              <h5 class="modal-title fw-bold d-flex align-items-center gap-2" id="noteModalTitle">
                <i class="bi bi-stickies"></i>
                <span>Create Note</span>
              </h5>
              <p class="text-secondary small mb-0 mt-1">Capture thoughts, reminders, labels, and images in one place.</p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <form id="noteForm">
            <div class="modal-body pt-3">
              <input type="hidden" id="noteTaskId" />

              <div class="row g-3">
                <div class="col-md-4">
                  <label for="noteType" class="form-label fw-semibold">Note Type</label>
                  <select class="form-select rounded-4" id="noteType">
                    <option value="text">Text Note</option>
                    <option value="image">Image Note</option>
                  </select>
                </div>

                <div class="col-md-8">
                  <label for="noteTitle" class="form-label fw-semibold">Title</label>
                  <input
                    type="text"
                    class="form-control rounded-4"
                    id="noteTitle"
                    placeholder="Enter note title"
                    required
                  />
                </div>

                <div class="col-12">
                  <label for="noteDescription" class="form-label fw-semibold">Description</label>
                  <textarea
                    class="form-control rounded-4"
                    id="noteDescription"
                    rows="5"
                    placeholder="Write your note..."
                  ></textarea>
                </div>

                <div class="col-md-6">
                  <label for="noteLabels" class="form-label fw-semibold">Labels</label>
                  <input
                    type="text"
                    class="form-control rounded-4"
                    id="noteLabels"
                    placeholder="study, java, work"
                  />
                </div>

                <div class="col-md-6">
                  <label for="noteReminder" class="form-label fw-semibold">Reminder</label>
                  <input
                    type="datetime-local"
                    class="form-control rounded-4"
                    id="noteReminder"
                  />
                </div>

                <div class="col-12 d-none" id="imageUploadGroup">
                  <label for="noteImage" class="form-label fw-semibold">Upload Image</label>
                  <input
                    type="file"
                    class="form-control rounded-4"
                    id="noteImage"
                    accept="image/*"
                  />
                  <div id="noteImagePreviewWrap" class="mt-3 d-none">
                    <div class="p-2 bg-light rounded-4">
                      <img
                        id="noteImagePreview"
                        alt="Preview"
                        class="img-fluid rounded-4"
                        style="max-height: 240px; width: 100%; object-fit: cover;"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="modal-footer border-0 pt-0">
              <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary rounded-pill px-4" id="noteSubmitBtn">
                <i class="bi bi-plus-circle me-2"></i>Save Note
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Share Modal -->
    <div class="modal fade" id="shareTaskModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-0 pb-0">
            <div>
              <h5 class="modal-title fw-bold d-flex align-items-center gap-2">
                <i class="bi bi-share"></i>
                <span>Share to Feed</span>
              </h5>
              <p class="text-secondary small mb-0 mt-1">Add a polished caption before posting your completed note.</p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <form id="shareTaskForm">
            <div class="modal-body pt-3">
              <input type="hidden" id="shareTaskId" />

              <div class="rounded-4 border bg-light p-3 mb-3">
                <div class="small text-muted mb-1">Selected note</div>
                <div id="shareTaskPreviewTitle" class="fw-bold text-dark"></div>
                <div id="shareTaskPreviewDescription" class="small text-secondary mt-1"></div>
              </div>

              <div class="mb-0">
                <label for="shareCaption" class="form-label fw-semibold">Caption</label>
                <textarea
                  class="form-control rounded-4"
                  id="shareCaption"
                  rows="4"
                  placeholder="What would you like to say about this note?"
                ></textarea>
              </div>
            </div>

            <div class="modal-footer border-0 pt-0">
              <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-warning rounded-pill px-4">
                <i class="bi bi-send me-2"></i>Post to Feed
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
